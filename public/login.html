<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Seamless Source Sitemap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a12;--surface:#12121e;--surface-2:#1a1a2e;
      --border:#2a2a44;--border-glow:#6366f150;
      --text:#e2e8f0;--text-muted:#94a3b8;
      --accent:#818cf8;--accent-dim:#4f46e5;
      --radius:12px;
    }
    body {
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      overflow:hidden;
    }
    .login-container {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:40px;
      width:100%;
      max-width:400px;
      box-shadow:0 8px 40px rgba(0,0,0,.6);
      text-align:center;
      position:relative;
    }
    .logo-icon {
      width:48px;height:48px;border-radius:12px;
      background:linear-gradient(135deg,var(--accent-dim),#c084fc);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;font-weight:800;color:#fff;
      margin:0 auto 20px;
    }
    h1 { font-size:24px; margin-bottom:10px; font-weight:700; letter-spacing:-0.5px; }
    p { color:var(--text-muted); font-size:14px; margin-bottom:30px; }
    input {
      width:100%;
      background:var(--surface-2);
      border:1px solid var(--border);
      color:var(--text);
      padding:14px;
      border-radius:8px;
      font-size:15px;
      margin-bottom:20px;
      outline:none;
      transition:all 0.2s;
    }
    input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--border-glow);
    }
    button {
      width:100%;
      background:var(--accent-dim);
      color:#fff;
      border:none;
      padding:14px;
      border-radius:8px;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      transition:all 0.2s;
    }
    button:hover { background:var(--accent); }
    .error-msg {
      color:#fb7185;
      font-size:13px;
      margin-top:-10px;
      margin-bottom:20px;
      display:none;
    }
    .error-msg.show { display:block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-icon">S</div>
    <h1>Sitemap Editor</h1>
    <p>Please enter the access password</p>
    
    <form id="login-form">
      <input type="password" id="password" placeholder="Password" required autofocus>
      <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
      <button type="submit" id="submit-btn">Access Workspace</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');
      
      btn.textContent = 'Verifying...';
      err.classList.remove('show');
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd })
        });
        
        if (res.ok) {
          btn.textContent = 'Success!';
          btn.style.background = '#34d399';
          setTimeout(() => { window.location.href = '/'; }, 500);
        } else {
          err.classList.add('show');
          btn.textContent = 'Access Workspace';
        }
      } catch (error) {
        err.textContent = 'Network error. Please try again.';
        err.classList.add('show');
        btn.textContent = 'Access Workspace';
      }
    });
  </script>
</body>
</html>
